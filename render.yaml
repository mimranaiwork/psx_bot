services:
  - type: web
    name: psx-ai-bot-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: ""
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: psx-ai-bot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
